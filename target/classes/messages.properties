instruction.text=Game&Watch Game Cover Making Tutorial: \n1. Place png/jpeg format images in the corresponding game folder of roms/*, such as roms/gb, roms/nes. Click Start and game covers will be produced in the covers path. \n2. Incremental update to update the newly added image. \n3. Adding subtitles will overwrite the file name onto the image.