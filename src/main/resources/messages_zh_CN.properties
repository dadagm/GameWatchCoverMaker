instruction.text=game&watch游戏封面制作教程：\n1.把png/jpeg格式的图片放到roms/*对应游戏文件夹内，比如roms/gb、roms/nes，点开始会在covers路径生产游戏封面。\n2.增量更新至更新新增的图片。\n3.添加字幕，会把文件名覆盖到图片上。